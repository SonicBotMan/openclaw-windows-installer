<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 配置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; padding: 20px;
    }
    .container {
      max-width: 600px; margin: 0 auto; background: white;
      border-radius: 16px; padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { color: #333; font-size: 28px; margin-bottom: 8px; }
    .header p { color: #666; font-size: 14px; }
    .status {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 12px; border-radius: 8px; margin-bottom: 20px;
    }
    .status.running { background: #d4edda; color: #155724; }
    .status.stopped { background: #f8d7da; color: #721c24; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; }
    .status.running .status-dot { background: #28a745; animation: pulse 2s infinite; }
    .status.stopped .status-dot { background: #dc3545; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .section { margin-bottom: 25px; }
    .section h2 { font-size: 16px; color: #333; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid #eee; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; }
    .form-group input, .form-group select {
      width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0;
      border-radius: 8px; font-size: 14px; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .btn-group { display: flex; gap: 10px; margin-top: 25px; }
    .btn {
      flex: 1; padding: 12px 20px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-secondary:hover { background: #e0e0e0; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-success { background: #28a745; color: white; }
    .toast {
      position: fixed; bottom: 30px; right: 30px; padding: 15px 25px;
      border-radius: 8px; color: white; font-size: 14px;
      opacity: 0; transform: translateY(20px); transition: all 0.3s; z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #28a745; }
    .toast.error { background: #dc3545; }
    .link { color: #667eea; text-decoration: none; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🌸 OpenClaw 配置</h1>
      <p>管理您的 AI 助手设置</p>
    </div>
    
    <div id="status" class="status stopped">
      <span class="status-dot"></span>
      <span id="status-text">检查中...</span>
    </div>
    
    <div class="section">
      <h2>🤖 模型设置</h2>
      <div class="form-row">
        <div class="form-group">
          <label>默认模型</label>
          <select id="defaultModel">
            <option value="zai/glm-4-flash">GLM-4-Flash (智谱)</option>
            <option value="zai/glm-4">GLM-4 (智谱)</option>
            <option value="minimax/MiniMax-M2.5-highspeed">MiniMax-M2.5 (高速)</option>
          </select>
        </div>
        <div class="form-group">
          <label>备用模型</label>
          <select id="fallbackModel">
            <option value="">无</option>
            <option value="zai/glm-4-flash">GLM-4-Flash</option>
            <option value="minimax/MiniMax-M2.5-highspeed">MiniMax-M2.5</option>
          </select>
        </div>
      </div>
    </div>
    
    <div class="section">
      <h2>🔑 GLM (智谱) API</h2>
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="zaiApiKey" placeholder="请输入智谱 API Key">
      </div>
      <div class="form-group">
        <label>API 地址</label>
        <input type="text" id="zaiBaseUrl" value="https://open.bigmodel.cn/api/paas/v4">
      </div>
    </div>
    
    <div class="section">
      <h2>🔑 MiniMax API</h2>
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="minimaxApiKey" placeholder="请输入 MiniMax API Key">
      </div>
      <div class="form-group">
        <label>API 地址</label>
        <input type="text" id="minimaxBaseUrl" value="https://api.minimax.chat/v1">
      </div>
    </div>
    
    <div class="section">
      <h2>🌐 服务设置</h2>
      <div class="form-row">
        <div class="form-group">
          <label>端口</label>
          <input type="number" id="gatewayPort" value="18789">
        </div>
        <div class="form-group">
          <label>绑定地址</label>
          <input type="text" id="gatewayBind" value="127.0.0.1">
        </div>
      </div>
    </div>
    
    <div class="btn-group">
      <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
      <button class="btn btn-secondary" onclick="openWeb()">🌐 打开网页</button>
    </div>
    
    <div class="btn-group">
      <button class="btn btn-success" id="startBtn" onclick="startService()">▶️ 启动服务</button>
      <button class="btn btn-danger" id="stopBtn" onclick="stopService()">⏹️ 停止服务</button>
    </div>
  </div>
  
  <div id="toast" class="toast"></div>
  
  <script>
    // Tauri invoke 包装器
    function tauriInvoke(cmd, args) {
      if (!window.__TAURI__ || !window.__TAURI__.tauri) {
        return Promise.reject(new Error('Tauri API 未初始化，请在 Tauri 应用中使用'));
      }
      return window.__TAURI__.tauri.invoke(cmd, args);
    }
    
    // 加载配置
    async function loadConfig() {
      try {
        const config = await tauriInvoke('get_config');
        document.getElementById('zaiApiKey').value = config.providers?.zai?.apiKey || '';
        document.getElementById('zaiBaseUrl').value = config.providers?.zai?.baseUrl || 'https://open.bigmodel.cn/api/paas/v4';
        document.getElementById('minimaxApiKey').value = config.providers?.minimax?.apiKey || '';
        document.getElementById('minimaxBaseUrl').value = config.providers?.minimax?.baseUrl || 'https://api.minimax.chat/v1';
        document.getElementById('defaultModel').value = config.agents?.defaults?.model || 'zai/glm-4-flash';
        document.getElementById('fallbackModel').value = config.agents?.defaults?.fallbacks?.[0] || '';
        document.getElementById('gatewayPort').value = config.gateway?.port || 18789;
        document.getElementById('gatewayBind').value = config.gateway?.bind || '127.0.0.1';
      } catch (e) {
        showToast('加载配置失败: ' + e, 'error');
      }
    }
    
    // 保存配置
    async function saveConfig() {
      const config = {
        providers: {
          zai: {
            type: 'zai',
            apiKey: document.getElementById('zaiApiKey').value,
            baseUrl: document.getElementById('zaiBaseUrl').value
          },
          minimax: {
            type: 'minimax',
            apiKey: document.getElementById('minimaxApiKey').value,
            baseUrl: document.getElementById('minimaxBaseUrl').value
          }
        },
        agents: {
          defaults: {
            model: document.getElementById('defaultModel').value,
            fallbacks: document.getElementById('fallbackModel').value ? [document.getElementById('fallbackModel').value] : []
          }
        },
        gateway: {
          port: parseInt(document.getElementById('gatewayPort').value),
          bind: document.getElementById('gatewayBind').value
        }
      };
      
      try {
        await tauriInvoke('save_config', { config });
        showToast('配置已保存 ✓', 'success');
      } catch (e) {
        showToast('保存失败: ' + e, 'error');
      }
    }
    
    // 检查服务状态
    async function checkStatus() {
      try {
        const running = await tauriInvoke('is_running');
        const statusEl = document.getElementById('status');
        const statusText = document.getElementById('status-text');
        
        if (running) {
          statusEl.className = 'status running';
          statusText.textContent = 'OpenClaw 运行中';
          document.getElementById('startBtn').disabled = true;
          document.getElementById('stopBtn').disabled = false;
        } else {
          statusEl.className = 'status stopped';
          statusText.textContent = 'OpenClaw 已停止';
          document.getElementById('startBtn').disabled = false;
          document.getElementById('stopBtn').disabled = true;
        }
      } catch (e) {
        console.error('检查状态失败:', e);
      }
    }
    
    // 启动服务
    async function startService() {
      try {
        await tauriInvoke('start_service');
        showToast('服务已启动 ✓', 'success');
        setTimeout(checkStatus, 2000);
      } catch (e) {
        showToast('启动失败: ' + e, 'error');
      }
    }
    
    // 停止服务
    async function stopService() {
      try {
        await tauriInvoke('stop_service');
        showToast('服务已停止', 'success');
        setTimeout(checkStatus, 1000);
      } catch (e) {
        showToast('停止失败: ' + e, 'error');
      }
    }
    
    // 打开网页
    function openWeb() {
      const port = document.getElementById('gatewayPort').value;
      window.open(`http://localhost:${port}`, '_blank');
    }
    
    // 显示提示
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    // 初始化
    window.addEventListener('DOMContentLoaded', () => {
      loadConfig();
      checkStatus();
      setInterval(checkStatus, 10000);
    });
  </script>
</body>
</html>
