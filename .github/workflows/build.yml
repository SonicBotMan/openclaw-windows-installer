name: Build Windows Installer

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '22.12.0'
  OPENCLAW_VERSION: '2026.3.7'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            config-tool/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Download Node.js Portable
        run: |
          $NodeUrl = "https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-win-x64.zip"
          Invoke-WebRequest -Uri $NodeUrl -OutFile node.zip
          Expand-Archive -Path node.zip -DestinationPath temp
          Move-Item "temp\node-v${{ env.NODE_VERSION }}-win-x64" "bundled\nodejs"
          Remove-Item node.zip, temp -Recurse -Force

      - name: Install OpenClaw
        run: |
          cd bundled/openclaw
          npm init -y
          npm install openclaw@${{ env.OPENCLAW_VERSION }} --production

      - name: Build Config Tool
        run: |
          cd config-tool
          npm install
          npm run build
          cd src-tauri
          cargo build --release
          Write-Host "=== Listing target/release contents ==="
          Get-ChildItem -Path "target\release" -Filter "*.exe" | ForEach-Object { Write-Host "  $($_.Name)" }
          # Copy to bundled
          $exePath = "target\release\openclaw-config.exe"
          if (Test-Path $exePath) {
            Copy-Item $exePath "..\..\bundled\openclaw-config.exe" -Force
            Write-Host "SUCCESS: Copied to bundled\openclaw-config.exe"
            # Verify
            Get-Item "..\..\bundled\openclaw-config.exe" | Select-Object Name, Length
          } else {
            Write-Error "EXE not found at $exePath"
            exit 1
          }

      - name: Download Inno Setup
        run: |
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile is.exe
          Start-Process -FilePath is.exe -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES" -Wait

      - name: Build Installer
        run: |
          $env:PATH = "C:\Program Files (x86)\Inno Setup 6;$env:PATH"
          # Verify exe exists before building installer
          Write-Host "=== Verifying bundled files ==="
          Get-ChildItem -Path "bundled" -File | ForEach-Object { Write-Host "  $($_.Name) - $($_.Length) bytes" }
          iscc installer/setup.iss

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-installer
          path: output/*.exe
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: openclaw-installer
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/*.exe
          generate_release_notes: true
