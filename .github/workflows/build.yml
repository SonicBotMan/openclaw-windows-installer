name: Build Windows Installer

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '22.12.0'
  OPENCLAW_VERSION: '2026.3.7'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            config-tool/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Download Node.js Portable
        run: |
          $NodeUrl = "https://nodejs.org/dist/v${{ env.NODE_VERSION }}/node-v${{ env.NODE_VERSION }}-win-x64.zip"
          Invoke-WebRequest -Uri $NodeUrl -OutFile node.zip
          Expand-Archive -Path node.zip -DestinationPath bundled\nodejs
          # Move contents from subfolder to parent
          Move-Item "bundled\nodejs\node-v${{ env.NODE_VERSION }}-win-x64\*" "bundled\nodejs\" -Force
          Remove-Item "bundled\nodejs\node-v${{ env.NODE_VERSION }}-win-x64" -Recurse -Force
          Remove-Item node.zip -Force

      - name: Install OpenClaw
        run: |
          cd bundled/openclaw
          npm init -y
          npm install openclaw@${{ env.OPENCLAW_VERSION }} --production

      - name: Build Config Tool
        run: |
          cd config-tool
          npm install
          # Build frontend first (required for tauri::generate_context!)
          npm run build
          # Verify dist exists
          if (-not (Test-Path "dist")) {
            Write-Host "Creating empty dist directory"
            New-Item -ItemType Directory -Path "dist" -Force
            # Create a minimal index.html
            '<!DOCTYPE html><html><head><title>OpenClaw Config</title></head><body><div id="app"></div></body></html>' | Out-File -FilePath "dist\index.html" -Encoding utf8
          }
          Get-ChildItem -Path "dist" -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }
          cd src-tauri
          cargo build --release
          Write-Host "=== Listing target/release contents ==="
          Get-ChildItem -Path "target\release" -Filter "*.exe" | ForEach-Object { Write-Host "  $($_.Name)" }
          # Copy to bundled
          $exePath = "target\release\openclaw-config.exe"
          if (Test-Path $exePath) {
            Copy-Item $exePath "..\..\bundled\openclaw-config.exe" -Force
            Write-Host "SUCCESS: Copied to bundled\openclaw-config.exe"
            # Verify
            Get-Item "..\..\bundled\openclaw-config.exe" | Select-Object Name, Length
          } else {
            Write-Error "EXE not found at $exePath"
            exit 1
          }

      - name: Download Inno Setup
        run: |
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile is.exe
          Start-Process -FilePath is.exe -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES" -Wait

      - name: Verify bundled directory
        run: |
          Write-Host "=== bundled directory structure ==="
          Get-ChildItem -Path "bundled" -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }
          Write-Host "=== Checking node.exe ==="
          if (Test-Path "bundled\nodejs\node.exe") {
            Write-Host "FOUND: bundled\nodejs\node.exe"
            Get-Item "bundled\nodejs\node.exe" | Select-Object Name, Length
          } else {
            Write-Error "NOT FOUND: bundled\nodejs\node.exe"
            exit 1
          }
          Write-Host "=== Checking openclaw ==="
          if (Test-Path "bundled\openclaw\node_modules\openclaw") {
            Write-Host "FOUND: bundled\openclaw\node_modules\openclaw"
          } else {
            Write-Error "NOT FOUND: bundled\openclaw\node_modules\openclaw"
            exit 1
          }

      - name: Build Installer
        run: |
          $env:PATH = "C:\Program Files (x86)\Inno Setup 6;$env:PATH"
          iscc installer/setup.iss

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-installer
          path: output/*.exe
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: openclaw-installer
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/*.exe
          generate_release_notes: true
